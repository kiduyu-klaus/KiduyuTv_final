name: Android Release CI

on:
  push:
    branches:
      - main

permissions:
  contents: write # Required to create a release
  packages: write # Required to upload release assets
  pages: write    # Required to deploy to GitHub Pages
  id-token: write # Required for OIDC auth with GitHub Pages

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all tags for version bumping

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine Release Tag (incremental patch bump)
        id: tag
        run: |
          # Find the latest semver tag of the form vX.Y.Z (ignoring build suffixes)
          LATEST=$(git tag --list 'v*.*.*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            # No prior tag — start at v1.1.1
            NEW_TAG="v1.1.1"
          else
            # Parse the three components and bump the patch
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEW_PATCH=$(( PATCH + 1 ))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${NEW_TAG}"

      - name: Get commit info
        id: commit_info
        run: |
          # Full commit body (used in the release body)
          FULL_MSG=$(git log -1 --pretty=%B | tr -d '\r')
          echo "full_message<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # First sentence / first non-empty line — used as the release title
          FIRST_LINE=$(git log -1 --pretty=%B | grep -m1 '[^[:space:]]' | sed 's/[[:space:]]*$//')
          echo "title=${FIRST_LINE}" >> $GITHUB_OUTPUT

          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename Debug APK
        id: rename_apk
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          BUILD=$(git rev-list --count HEAD)
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          NEW_APK_NAME="KiduyuTv-debug-${VERSION}-build${BUILD}.apk"
          mv "$APK_PATH" "app/build/outputs/apk/debug/$NEW_APK_NAME"
          echo "apk_path=app/build/outputs/apk/debug/$NEW_APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.rename_apk.outputs.apk_path }}

      # ── Restore keystore & build signed release APK in the same job ──────
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > kiduyutv_final

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename Release APK
        id: rename_release
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          BUILD=$(git rev-list --count HEAD)
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          NEW_APK_NAME="KiduyuTv-release-${VERSION}-build${BUILD}.apk"
          mv "$APK_PATH" "app/build/outputs/apk/release/$NEW_APK_NAME"
          echo "apk_path=app/build/outputs/apk/release/$NEW_APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.rename_release.outputs.apk_path }}

      - name: Create GitHub Release (debug + release APKs)
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.commit_info.outputs.title }} — ${{ steps.tag.outputs.tag }}"
          body: |
            ## KiduyuTv ${{ steps.tag.outputs.tag }}
            **${{ steps.commit_info.outputs.title }}**

            **Commit:** [`${{ steps.commit_info.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`
            **Run:** ${{ github.run_id }}

            ---
            ${{ steps.commit_info.outputs.full_message }}
            ---

            ### Install
            | APK | Notes |
            |-----|-------|
            | `KiduyuTv-debug-*.apk` | Debug build — logging enabled |
            | `KiduyuTv-release-*.apk` | Signed release build |

            **Sideload via ADB:**
            ```bash
            adb connect <device-ip>:5555
            adb install KiduyuTv-release-*.apk
            ```
          files: |
            ${{ steps.rename_apk.outputs.apk_path }}
            ${{ steps.rename_release.outputs.apk_path }}
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy index.html to GitHub Pages (with live APK download link) ──────
  deploy_pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_and_release   # runs AFTER release is published so the API has the new tag

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Fetch the latest prerelease from the GitHub API so we always resolve
      # the real APK download URL — even if the build step renamed the file.
      - name: Resolve latest release info
        id: release_info
        run: |
          RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq '[ .[] | select(.prerelease == true) ] | first')

          TAG=$(echo "$RELEASE"    | jq -r '.tag_name')
          TITLE=$(echo "$RELEASE"  | jq -r '.name')

          # Grab the signed release APK (excludes the debug one)
          APK_URL=$(echo "$RELEASE" | jq -r \
            '[.assets[] | select(.name | test("release"))] | first | .browser_download_url')
          APK_NAME=$(echo "$RELEASE" | jq -r \
            '[.assets[] | select(.name | test("release"))] | first | .name')

          echo "tag=${TAG}"           >> $GITHUB_OUTPUT
          echo "title=${TITLE}"       >> $GITHUB_OUTPUT
          echo "apk_url=${APK_URL}"   >> $GITHUB_OUTPUT
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Resolved: ${APK_NAME} @ ${APK_URL}"

      # Surgically update the href and download attributes on the existing
      # .btn-primary anchor inside .download-buttons — no new HTML is added.
      - name: Update APK download link in index.html
        env:
          APK_URL:  ${{ steps.release_info.outputs.apk_url }}
          APK_NAME: ${{ steps.release_info.outputs.apk_name }}
        run: |
          python3 - <<'PYEOF'
          import os, re, pathlib

          apk_url  = os.environ["APK_URL"]
          apk_name = os.environ["APK_NAME"]

          html = pathlib.Path("index.html").read_text(encoding="utf-8")

          # Replace href="..." — matches any releases/download URL
          html = re.sub(
              r'(href=")https://github\.com/[^/]+/[^/]+/releases/download/[^"]+(")',
              rf'\g<1>{apk_url}\2',
              html
          )

          # Replace download="KiduyuTv-release-..." attribute value
          html = re.sub(
              r'(download=")KiduyuTv-release-[^"]+(")',
              rf'\g<1>{apk_name}\2',
              html
          )

          pathlib.Path("index.html").write_text(html, encoding="utf-8")
          print(f"✅ Updated download link → {apk_name}")
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change to 'docs' or 'web' if index.html lives in a subfolder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Cleanup: delete all failed workflow runs ─────────────────────────────
  cleanup_failed_runs:
    name: Delete Failed Workflow Runs
    runs-on: ubuntu-latest
    needs: build_and_release
    if: always()
    steps:
      - name: Check for failed runs
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            let failedRuns = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                status: 'failure',
                per_page: 100,
                page,
              });
              if (data.workflow_runs.length === 0) break;
              failedRuns = failedRuns.concat(data.workflow_runs);
              page++;
            }
            console.log(`Found ${failedRuns.length} failed run(s).`);
            core.setOutput('count', failedRuns.length);
            core.setOutput('run_ids', JSON.stringify(failedRuns.map(r => r.id)));

      - name: Delete failed runs
        if: steps.check.outputs.count > 0
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner   = context.repo.owner;
            const repo    = context.repo.repo;
            const runIds  = JSON.parse('${{ steps.check.outputs.run_ids }}');
            const current = context.runId;
            let deleted = 0;
            let skipped = 0;
            for (const id of runIds) {
              if (id === current) {
                console.log(`Skipping current run #${id}`);
                skipped++;
                continue;
              }
              try {
                await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: id });
                console.log(`✅ Deleted failed run #${id}`);
                deleted++;
              } catch (err) {
                console.warn(`⚠️  Could not delete run #${id}: ${err.message}`);
              }
            }
            console.log(`\nSummary: ${deleted} deleted, ${skipped} skipped (current run).`);